name: aegis_flutter
description: Offline-First P2P Mesh Communication & Emergency Platform
publish_to: 'none'

version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

# Dependencies specify other packages that your package needs in order to work.
dependencies:
  flutter:
    sdk: flutter

  # ■■ TRANSPORT — 3 Layers ■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■
  # WiFi Direct — NO same WiFi needed, 200m range
  nearby_connections: ^4.0.0
  
  # Bluetooth LE — Fallback, 30m range
  flutter_blue_plus: ^1.31.15
  
  # mDNS — Same WiFi, 100m range
  multicast_dns: ^0.3.2+4
  
  # State Management
  flutter_riverpod: ^2.5.1
  
  # Navigation
  go_router: ^12.0.0
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Encryption
  cryptography: ^2.7.0
  
  # Location
  geolocator: ^10.1.0
  
  # Audio / Alarm
  audioplayers: ^5.2.1
  
  # Notifications
  flutter_local_notifications: ^18.0.1
  
  # HTTP client (for signaling service / API calls)
  http: ^1.2.1

  # Utilities
  uuid: ^4.4.0
  permission_handler: ^11.3.1
  path_provider: ^2.1.2
  
  # Image picker for profile photos
  image_picker: ^1.0.7

  # ■■ QR CODE — Direct Peer Connection via QR ■■■■■■■■■■■■■■■
  # QR code generation for Identity Screen
  qr_flutter: ^4.1.0

  # QR code scanning via camera
  mobile_scanner: ^3.5.7

  # Get local WiFi IP address for QR TCP connection
  network_info_plus: ^6.0.0

  # Cupertino Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  hive_generator: ^2.0.1

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true
  
  # Assets for audio files (SOS alarm) and images
  assets:
    - assets/sounds/
    - assets/images/logo.png
