name: aegis_flutter
description: Offline-First P2P Mesh Communication & Emergency Platform
publish_to: 'none'

version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

# Dependencies specify other packages that your package needs in order to work.
dependencies:
  flutter:
    sdk: flutter

  # P2P / WebRTC
  flutter_webrtc: ^0.9.47
  
  # LAN Discovery
  multicast_dns: ^0.3.2+4
  
  # State Management
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0
  
  # Navigation
  go_router: ^12.0.0
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Encryption
  cryptography: ^2.7.0
  
  # HTTP (for signaling relay)
  dio: ^5.3.0
  
  # Location
  geolocator: ^10.1.0
  
  # Audio / Alarm
  audioplayers: ^5.2.1
  
  # Notifications
  flutter_local_notifications: ^16.1.0
  
  # Background Service
  flutter_background_service: ^5.0.5
  
  # QR Code (mDNS fallback)
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.5.5
  
  # Utilities
  uuid: ^4.1.0
  
  # Cupertino Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  hive_generator: ^2.0.1

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true
  
  # Assets for audio files (SOS alarm)
  assets:
    - assets/sounds/
